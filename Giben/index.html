<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>E-Modul - Pelatihan Gizi Bencana</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #3498db, #2c3e50);
        font-family: Arial, sans-serif;
    }

    .container {
        width: 90%;
        max-width: 1000px;
        text-align: center;
        color: white;
    }

    .logo {
        width: 200px;
        margin-bottom: 20px;
    }

    h1 {
        margin-bottom: 40px;
    }

    .menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .menu a {
        width: 200px;          /* Lebar tetap */
        height: 80px;          /* Tinggi sama semua */
        display: flex;         /* ⬅ penting */
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        text-decoration: none;
        background-color: white;
        color: #2c3e50;
        border-radius: 10px;
        font-weight: bold;
        transition: 0.3s;
        line-height: 1.3;
    }

    .menu a:hover {
        background-color: #1abc9c;
        color: white;
        transform: translateY(-5px);
    }
</style>
</head>
